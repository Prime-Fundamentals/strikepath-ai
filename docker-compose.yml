services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: strikepath
      POSTGRES_USER: strikepath
      POSTGRES_PASSWORD: strikepath_dev_password
    ports:
      - "5432:5432"
    volumes:
      - strikepath_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strikepath -d strikepath"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./apps/api
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://strikepath:strikepath_dev_password@postgres:5432/strikepath
      SECRET_KEY: local-development-secret-change-before-production
      CORS_ORIGINS: http://localhost:3000
      SEED_DEMO: "true"
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./apps/web
    environment:
      API_INTERNAL_URL: http://api:8000
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  strikepath_postgres:
